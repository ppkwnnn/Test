<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ละอองไออุ่น ถึงคุณคนโปรด | Gentle Steam, Dearly Belov'd</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Mali:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cream: #FDFBF7;
            --beige: #F5E6D3;
            --soft-brown: #A67B5B;
            --dark-brown: #5D4037;
            --cozy-gray: #E0E0E0;
            --nude: #D7B19D;
        }

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: 'Mali', cursive;
            background-color: var(--beige);
            color: var(--dark-brown);
            overflow: hidden;
        }

        /* Container หลัก */
        .game-container {
            position: relative;
            width: 100%;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
            background-color: #000;
        }

        .scene {
            display: none;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            position: absolute;
            top: 0; left: 0;
            animation: fadeIn 1s;
        }

        .active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* UI เริ่มต้น */
        #start-screen {
            background-image: url('https://drive.google.com/uc?export=view&id=1qAg9r4VieXBG3c0vgIcSa4vwxiW9Wnw_');
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .logo { width: 300px; margin-bottom: 2rem; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2)); }

        .menu-btn {
            background-color: var(--cream);
            color: var(--dark-brown);
            border: 2px solid var(--nude);
            padding: 12px 35px;
            margin: 10px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-family: 'Itim', cursive;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 0 var(--nude);
        }

        .menu-btn:hover { background-color: var(--nude); transform: translateY(-2px); }

        .credit-btn {
            position: absolute; top: 20px; right: 20px;
            background: none; border: 1px solid var(--dark-brown);
            padding: 5px 15px; border-radius: 15px; cursor: pointer;
        }

        /* ระบบสนทนา */
        .character {
            position: absolute; bottom: 0; left: 50%;
            transform: translateX(-50%);
            height: 80%; pointer-events: none;
            transition: 0.5s;
        }

        .dialog-box {
            position: absolute; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            width: 90%; max-width: 800px;
            background: rgba(255, 253, 247, 0.95);
            border: 4px solid var(--nude);
            border-radius: 20px;
            padding: 25px;
            min-height: 150px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .speaker-name { font-weight: bold; font-size: 1.3rem; margin-bottom: 10px; color: var(--soft-brown); }

        .choices { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }

        .choice-btn {
            background: var(--nude); color: white;
            border: none; padding: 8px 20px; border-radius: 10px;
            cursor: pointer; font-family: 'Mali', sans-serif;
        }

        /* ระบบเขียน Post-it */
        .postit-system {
            background: rgba(253, 251, 247, 0.9);
            padding: 30px; border-radius: 20px; text-align: center;
            width: 90%; max-width: 500px; margin: 50px auto;
        }

        .pattern-grid { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .pattern-item { width: 60px; height: 60px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
        .pattern-item.selected { border-color: var(--soft-brown); }

        textarea { width: 100%; height: 100px; margin-top: 10px; border-radius: 10px; border: 1px solid var(--nude); padding: 10px; }

        /* บอร์ดคำอวยพร */
        #board-scene { background-image: url('https://cache-igetweb-v2.mt108.info/uploads/images-cache/3114/product/1a86c7b4c87a6e23feaf6bfc562e19b0_full.png'); }
        
        .sticky-note {
            width: 120px; height: 120px;
            background: white; border-radius: 50%;
            position: absolute; display: flex;
            align-items: center; justify-content: center;
            padding: 10px; text-align: center; font-size: 0.7rem;
            box-shadow: 2px 4px 8px rgba(0,0,0,0.1);
            cursor: pointer; transition: 0.3s;
        }
    </style>
</head>
<body>

<div class="game-container">
    <audio id="bgm" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>
    <audio id="sfx-write"><source src="https://assets.mixkit.co/active_storage/sfx/2239/2239-preview.mp3" type="audio/mpeg"></audio>
    <audio id="sfx-bell"><source src="https://assets.mixkit.co/active_storage/sfx/1066/1066-preview.mp3" type="audio/mpeg"></audio>
    <audio id="sfx-cup"><source src="https://assets.mixkit.co/active_storage/sfx/2048/2048-preview.mp3" type="audio/mpeg"></audio>

    <section id="start-screen" class="scene active">
        <button class="credit-btn" onclick="alert('Credit: Art by Hoyoverse | Developed for you')">เครดิต</button>
        <img src="https://drive.google.com/uc?export=view&id=1vwapg4i2lzLWafERRbm8jLkJe0TMusuI" class="logo" alt="Logo">
        <button class="menu-btn" onclick="startGame()">เริ่มเกม</button>
        <button class="menu-btn" onclick="openBoard()">ดูหน้ารวมคำอวยพร</button>
    </section>

    <section id="game-scene" class="scene" style="background-image: url('https://drive.google.com/uc?export=view&id=1qAg9r4VieXBG3c0vgIcSa4vwxiW9Wnw_')">
        <img id="char-img" src="https://webstatic.hoyoverse.com/upload/op-public/2021/03/31/ff800e08532c0bf6fd014e72e5ca81a4_8076081534056378253.png" class="character" style="display:none;">
        <div class="dialog-box">
            <div id="speaker" class="speaker-name">บรรยาย</div>
            <div id="text-content">...</div>
            <div id="choices" class="choices"></div>
        </div>
    </section>

    <section id="write-scene" class="scene">
        <div class="postit-system">
            <h3>The Latte Art Post-it</h3>
            <p>เลือกลายที่ชอบและเขียนคำอวยพรให้เคียวมุ</p>
            <div class="pattern-grid">
                <img src="https://drive.google.com/uc?export=view&id=1kRJfQikzrztM-5SPeUxFvKoKkQOOt-hI" class="pattern-item" onclick="selectPattern(this, 'Heart')" title="Heart">
                <img src="https://drive.google.com/uc?export=view&id=1zjZJcvIegaWh93h_0J7So9E8vSI_cuwL" class="pattern-item" onclick="selectPattern(this, 'Rosetta')" title="Rosetta">
                <img src="https://drive.google.com/uc?export=view&id=1mnkyTZunwc6hTxdrYsHcOQZhby5TGgJu" class="pattern-item" onclick="selectPattern(this, 'Cat Paw')" title="Cat Paw">
                <img src="https://drive.google.com/uc?export=view&id=1zjZJcvIegaWh93h_0J7So9E8vSI_cuwL" class="pattern-item" onclick="selectPattern(this, 'Star')" title="Star">
            </div>
            <input type="text" id="user-name" placeholder="ชื่อของคุณ" style="width:100%; padding:10px; border-radius:10px; border:1px solid var(--nude);">
            <textarea id="user-wish" placeholder="เขียนคำอวยพรที่นี่..." onfocus="playSFX('write')"></textarea>
            <button class="menu-btn" onclick="submitWish()">ส่งข้อความ</button>
        </div>
    </section>

    <section id="board-scene" class="scene">
        <button class="menu-btn" style="position:fixed; top:10px; left:10px; z-index:100;" onclick="location.reload()">กลับหน้าหลัก</button>
        <div id="board-container"></div>
    </section>
</div>

<script>
    // --- Configuration ---
    const DB_URL = "https://project-test01-49383-default-rtdb.firebaseio.com/wishes.json";
    let selectedPattern = "";
    let state = { drink: "", snack: "" };

    const story = {
        1: { text: "หลังจากผ่านมรสุมความเหนื่อยล้ามาทั้งสัปดาห์ ในที่สุดวันหยุดที่เฝ้าฝันถึงก็มาถึงเสียที...", speaker: "บรรยาย", char: false, choices: [{t: "ถัดไป", n: 2}] },
        2: { text: "คุณเดินผ่านร้านกาแฟเล็ก ๆ ร้านหนึ่ง มันดูเรียบง่าย แต่กลับให้ความรู้สึกอบอุ่นอย่างบอกไม่ถูก...", speaker: "บรรยาย", char: false, choices: [{t: "เข้าไปในร้าน", n: 4}, {t: "ไม่เข้าไป", n: 0}] },
        4: { text: "กริ๊ง... กลิ่นกาแฟคั่วบดโอบล้อมตัวคุณไว้ราวกับกำลังปลอบประโลม บรรยากาศในร้านดีจัง... จะนั่งตรงไหนดีนะ?", speaker: "Y", char: false, choices: [{t: "เคาน์เตอร์ไม้", n: 5}, {t: "ริมหน้าต่าง", n: 5}, {t: "มุมในสุด", n: 5}] },
        5: { text: "สวัสดีครับ... ไม่คุ้นหน้าเลย มาครั้งแรกหรือเปล่าครับ? รับเครื่องดื่มอะไรดีครับ?", speaker: "เคียวมุ", char: true, 
             choices: [
                {t: "ลาเต้", n: 5.1, act:()=>state.drink="ลาเต้"}, 
                {t: "คาปูชิโน่", n: 5.1, act:()=>state.drink="คาปูชิโน่"},
                {t: "ช็อกโกแลต", n: 5.1, act:()=>state.drink="ช็อกโกแลต"}
             ] 
        },
        5.1: { text: "แล้วรับขนมทานคู่กันเพิ่มด้วยไหมครับ?", speaker: "เคียวมุ", char: true, 
               choices: [
                {t: "สตรอว์เบอร์รี่ช็อตเค้ก", n: 6, act:()=>state.snack="สตรอว์เบอร์รี่ช็อตเค้ก"},
                {t: "ครัวซองต์", n: 6, act:()=>state.snack="ครัวซองต์"}
               ] 
        },
        6: { text: "รอสักครู่นะครับ... (เวลาผ่านไป) นี่ครับ... ลองชิมดูสักนิดสิครับ ไม่ทราบว่ามันจะถูกปากคุณหรือเปล่า?", speaker: "เคียวมุ", char: true, choices: [{t: "ชิมดู", n: 6.1}] },
        6.1: { text: "อร่อยมากเลยค่ะ! เคียวมุเล่าว่าวันนี้เป็นวันเกิดของเขาและเขาตั้งใจจะเลี้ยงมื้อนี้คุณ...", speaker: "บรรยาย", char: true, 
               choices: [
                {t: "สุขสันต์วันเกิดนะคะ! (เขียนคำอวยพร)", n: 10},
                {t: "ขอบคุณมากนะใจดีจัง", n: 9}
               ] 
        },
        9: { text: "ยินดีที่สุดครับ... พักผ่อนให้เต็มที่นะ ถ้ามีโอกาส... หวังว่าเราจะได้พบกันใหม่นะครับ", speaker: "เคียวมุ", char: true, choices: [{t: "จบเกม", n: 0}] },
        10: { text: "คำอวยพรของคุณทำให้หัวใจของผมฟูขึ้นเยอะเลย... ช่วยเขียนลงในกระดาษโน้ตให้ผมหน่อยได้ไหมครับ?", speaker: "เคียวมุ", char: true, choices: [{t: "ตกลง", n: "WRITE"}] }
    };

    function startGame() {
        document.getElementById('bgm').play();
        showScene('game-scene');
        renderStory(1);
    }

    function renderStory(id) {
        if(id === 0) { location.reload(); return; }
        if(id === "WRITE") { showScene('write-scene'); return; }

        const node = story[id];
        document.getElementById('speaker').innerText = node.speaker;
        document.getElementById('text-content').innerText = node.text;
        document.getElementById('char-img').style.display = node.char ? 'block' : 'none';
        
        const choicesDiv = document.getElementById('choices');
        choicesDiv.innerHTML = '';
        node.choices.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = c.t;
            btn.onclick = () => { if(c.act) c.act(); renderStory(c.n); };
            choicesDiv.appendChild(btn);
        });
    }

    function selectPattern(el, name) {
        document.querySelectorAll('.pattern-item').forEach(i => i.classList.remove('selected'));
        el.classList.add('selected');
        selectedPattern = name;
    }

    function playSFX(id) {
        document.getElementById('sfx-' + id).play();
    }

    async function submitWish() {
        const name = document.getElementById('user-name').value;
        const wish = document.getElementById('user-wish').value;
        if(!name || !wish || !selectedPattern) return alert("กรุณากรอกข้อมูลและเลือกลายให้ครบถ้วนนะคะ");

        playSFX('bell');
        const data = { name, wish, pattern: selectedPattern, date: new Date().toISOString() };
        
        try {
            await fetch(DB_URL, { method: 'POST', body: JSON.stringify(data) });
            alert("เคียวมุได้รับคำอวยพรของคุณแล้ว! ขอบคุณที่มอบของขวัญที่พิเศษที่สุดให้เขานะคะ");
            window.open('https://drive.google.com/file/d/1i-3rUS9Fc_UNuM1jPZJiWFdpT43HxEd-/view?usp=sharing', '_blank');
            location.reload();
        } catch (e) {
            alert("ขออภัย ระบบขัดข้องเล็กน้อย แต่เคียวมุรับรู้ถึงความปรารถนาดีของคุณแล้วค่ะ");
        }
    }

    async function openBoard() {
        showScene('board-scene');
        const container = document.getElementById('board-container');
        container.innerHTML = 'กำลังโหลดคำอวยพร...';
        
        try {
            const res = await fetch(DB_URL);
            const data = await res.json();
            container.innerHTML = '';
            for(let key in data) {
                const item = data[key];
                const note = document.createElement('div');
                note.className = 'sticky-note';
                // สุ่มตำแหน่ง
                note.style.left = Math.random() * 70 + 10 + '%';
                note.style.top = Math.random() * 70 + 10 + '%';
                note.style.transform = `rotate(${Math.random() * 20 - 10}deg)`;
                note.innerHTML = `<strong>${item.name}</strong><br>${item.pattern}`;
                note.onclick = () => {
                    playSFX('cup');
                    alert(`จากคุณ: ${item.name}\n\n"${item.wish}"`);
                };
                container.appendChild(note);
            }
        } catch (e) {
            container.innerHTML = 'ยังไม่มีคำอวยพรในขณะนี้';
        }
    }

    function showScene(id) {
        document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>

</body>
</html>
