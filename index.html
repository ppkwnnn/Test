<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warm Café Visual Novel - Birthday Special</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cafe-cream: #FDF5E6;
            --cafe-brown: #5a4a42;
            --cafe-gold: #f0c987;
            --pink-notebook: #ff85a2;
            --pink-line: #ffb3c1;
            --glass-white: rgba(255, 255, 255, 0.85);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Prompt', sans-serif;
            overflow: hidden;
            background-color: #222;
        }

        /* Background Layer */
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: background-image 1.2s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        /* Character Layer */
        #character {
            position: absolute;
            bottom: 180px; /* ขยับขึ้นเหนือกล่องคำพูดเล็กน้อย */
            height: 75%;
            max-height: 700px;
            opacity: 0;
            transition: opacity 0.8s ease, transform 0.5s ease;
            z-index: 1;
        }

        /* --- Dialogue Box Style (ตามรูปตัวอย่าง) --- */
        #dialogue-box {
            width: 92%;
            max-width: 900px;
            min-height: 160px;
            background: var(--glass-white);
            border-radius: 25px;
            margin-bottom: 30px;
            padding: 40px 45px 25px 45px;
            box-sizing: border-box;
            border: 3px solid var(--cafe-gold);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            z-index: 10;
            position: relative;
            backdrop-filter: blur(8px);
        }

        #name-tag {
            position: absolute;
            top: -18px;
            left: 45px;
            background: linear-gradient(to right, #f3b05a, #f7d08a);
            color: white;
            padding: 6px 45px;
            border-radius: 18px;
            font-weight: 600;
            font-size: 1.2rem;
            border: 2px solid #ffffff;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.1);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        #text-content {
            font-size: 1.2rem;
            color: var(--cafe-brown);
            line-height: 1.8;
        }

        .auto-indicator {
            position: absolute;
            right: 30px;
            bottom: 15px;
            color: var(--cafe-gold);
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* --- Choice Style --- */
        #choice-container {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 80%;
            max-width: 400px;
            z-index: 20;
        }

        .choice-btn {
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid var(--cafe-gold);
            padding: 14px 25px;
            border-radius: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--cafe-brown);
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .choice-btn:hover {
            background: var(--cafe-gold);
            color: white;
            transform: scale(1.05);
        }

        /* สมุดโน้ตสไตล์น้ำตาล-ขาว */
        #wish-form {
            display: none;
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 450px;
            height: 580px;
            background: #ffffff; /* กระดาษสีขาวสะอาด */
            padding: 40px 30px 30px 65px; /* เว้นที่ด้านซ้ายให้ห่วง */
            border-radius: 5px 20px 20px 5px;
            box-shadow: 15px 15px 40px rgba(0,0,0,0.2);
            z-index: 30;
            box-sizing: border-box;
            border: 1px solid #e0e0e0;
            border-left: 10px solid #8B4513; /* สันสมุดสีน้ำตาลเข้ม */
        }

        /* สร้างห่วงสมุด (Spiral) โทนสีน้ำตาล */
        #wish-form::before {
            content: "";
            position: absolute;
            top: 30px;
            left: 15px;
            bottom: 30px;
            width: 35px;
            /* สร้างลายห่วงสีน้ำตาลสลับเข้มอ่อน */
            background-image: linear-gradient(to bottom, 
                transparent 6px, 
                #5a4a42 6px, #5a4a42 18px, 
                transparent 18px, transparent 30px);
            background-size: 100% 30px;
            z-index: 31;
        }

        /* หัวกระดาษ */
        .notebook-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #D2B48C; /* เส้นคั่นสีน้ำตาลอ่อน */
            padding-bottom: 10px;
        }

        .notebook-header .date-text {
            color: #8B4513;
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* พื้นหลังเส้นบรรทัดสีน้ำตาลจางๆ */
        .notebook-body {
            background-image: linear-gradient(#f0e6d6 1px, transparent 1px);
            background-size: 100% 32px;
            line-height: 32px;
            height: 380px;
        }

        #user-name, #user-wish {
            width: 100%;
            background: transparent;
            border: none;
            font-family: 'Prompt', sans-serif;
            outline: none;
            color: #444;
        }

        #user-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 10px;
            border-bottom: 1px dashed #D2B48C;
        }

        #user-wish {
            line-height: 32px;
            resize: none;
        }

        /* ปุ่มส่งสไตล์คาเฟ่ (น้ำตาลเข้ม) */
        .submit-btn {
            margin-top: 20px;
            background: #5a4a42; /* สีเดียวกับป้ายชื่อพนักงาน */
            color: #ffffff;
            border: none;
            padding: 12px 35px;
            border-radius: 25px;
            cursor: pointer;
            float: right;
            font-family: 'Prompt', sans-serif;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .submit-btn:hover {
            background: #8B4513;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        #start-screen {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 20%, #f4e7cf, #d29b59 55%, #7f5137 100%);
            color: #fff;
            z-index: 999;
            display: grid;
            place-items: center;
            text-align: center;
            padding: 20px;
            font-family: 'Prompt', sans-serif;
        }

        .start-logo {
            font-size: clamp(2rem, 6vw, 3.3rem);
            letter-spacing: 1px;
            font-weight: 800;
            margin-bottom: 0.2em;
            text-shadow: 0 4px 16px rgba(0,0,0,0.2);
        }

        .start-subtitle {
            color: #ffe9c8;
            margin-bottom: 1rem;
            font-size: clamp(0.9rem, 2.2vw, 1.3rem);
            font-weight: 500;
            text-shadow: 0 3px 10px rgba(0,0,0,0.15);
        }

        #start-btn {
            border: none;
            border-radius: 999px;
            background: #fff;
            color: #5a3a18;
            font-weight: 700;
            font-size: 1rem;
            padding: 12px 30px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.25);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        #start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 22px rgba(0,0,0,0.3);
        }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            #character { height: 60%; bottom: 180px; }
            #dialogue-box { font-size: 1rem; padding: 35px 25px 20px 25px; }
            #name-tag { left: 25px; padding: 4px 30px; font-size: 1rem; }
            #wish-form { height: 500px; padding-left: 55px; }
        }
    </style>
</head>
<body>

<div id="start-screen">
    <div class="start-logo">🍵 Warm Café</div>
    <div class="start-subtitle">A Birthday Visual Novel</div>
    <button id="start-btn" onclick="startGame()">Start</button>
</div>

<div id="game-container" style="background-image: url('https://images.unsplash.com/photo-1509042239263-0219ca99738d?q=80&w=1974&auto=format&fit=crop');">
    
    <img id="character" src="https://webstatic.hoyoverse.com/upload/op-public/2021/03/31/6ce27f03e5f178c0048d38d74c0b853d_7730768930418605664.png" alt="Staff">

    <div id="choice-container"></div>

    <div id="dialogue-box">
        <div id="name-tag">???</div>
        <div id="text-content">...</div>
        <div class="auto-indicator">AUTO ▶</div>
    </div>

    <div id="wish-form">
        <div class="notebook-header">
            <span class="date-text">BIRTHDAY NOTE ☕</span>
            <div style="color: #D2B48C;">🖋️</div>
        </div>
        
        <input type="text" id="user-name" placeholder="ชื่อของคุณ..." autocomplete="off">
        
        <div class="notebook-body">
            <textarea id="user-wish" rows="11" placeholder="เขียนความในใจและคำอวยพรที่นี่..."></textarea>
        </div>
        
        <button class="submit-btn" onclick="submitWish()">บันทึกลงสมุด 📋</button>
    </div>
</div>

<script>
    const textContent = document.getElementById('text-content');
    const nameTag = document.getElementById('name-tag');
    const choiceContainer = document.getElementById('choice-container');
    const characterImg = document.getElementById('character');
    const dialogueBox = document.getElementById('dialogue-box');
    const wishForm = document.getElementById('wish-form');
    const gameContainer = document.getElementById('game-container');

    let selectedDrink = "";
    let isCharacterVisible = false;

    const story = {
        1: {
            text: "ในขณะที่คุณเหนื่อยล้าและกำลังมองหาที่นั่งพักใจสักคุณก็พบกับร้านกาแฟแห่งหนึ่ง เป็นร้านกาแฟที่มองแล้วชวนให้รู้สึกอบอุ่นใจ...",
            name: "ระบบ",
            bg: "https://images.unsplash.com/photo-1509042239263-0219ca99738d?q=80&w=1974&auto=format&fit=crop",
            choices: [{ text: "ตัดสินใจเดินเข้าไป", next: 2 }]
        },
        2: {
            text: "คุณก้าวเข้ามาในร้าน กลิ่นหอมของเมล็ดกาแฟคั่วอบอวลไปทั่ว... คุณอยากจะเลือกนั่งตรงไหนดี?",
            name: "ความคิด",
            bg: "https://images.unsplash.com/photo-1554118811-1e0d58224f24?q=80&w=2047&auto=format&fit=crop",
            choices: [
                { text: "นั่งตรงข้างริมหน้าต่าง", next: 3 },
                { text: "นั่งตรงเคาน์เตอร์บาร์", next: 3 },
                { text: "นั่งตรงมุมร้าน", next: 3 }
            ]
        },
        3: {
            text: "สวัสดียามบ่ายครับ ขอบคุณที่แวะมาที่ร้านของเรานะครับ อากาศวันนี้เป็นอย่างไรบ้าง?",
            name: "พนักงาน",
            showChar: true,
            choices: [
                { text: "อากาศค่อนข้างอบอุ่น", next: 4.1 },
                { text: "อากาศค่อนข้างเย็น", next: 4.2 }
            ]
        },
        4.1: {
            text: "ถ้าอากาศอุ่นๆ แบบนี้ รับเครื่องดื่มเย็นๆ สักแก้วน่าจะช่วยให้สดชื่นขึ้นนะ รับอะไรดีครับ?",
            name: "พนักงาน",
            choices: [
                { text: "ลาเต้เย็น", drink: "ลาเต้เย็น", next: 5 },
                { text: "อเมริกาโน่เย็น", drink: "อเมริกาโน่เย็น", next: 5 },
                { text: "มัทฉะลาเต้เย็น", drink: "มัทฉะลาเต้เย็น", next: 5 },
                { text: "อิตาเลี่ยนโซดา", drink: "อิตาเลี่ยนโซดา", next: 5 },
                { text: "ชาผลไม้เย็น", drink: "ชาผลไม้เย็น", next: 5 }
            ]
        },
        4.2: {
            text: "วันที่อากาศเย็นแบบนี้ การดื่มอะไรอุ่นๆ จะช่วยให้ร่างกายผ่อนคลายขึ้นมากเลยล่ะครับ รับอะไรดี?",
            name: "พนักงาน",
            choices: [
                { text: "ลาเต้ร้อน", drink: "ลาเต้ร้อน", next: 5 },
                { text: "อเมริกาโน่ร้อน", drink: "อเมริกาโน่ร้อน", next: 5 },
                { text: "มัทฉะลาเต้ร้อน", drink: "มัทฉะลาเต้ร้อน", next: 5 },
                { text: "ชาร้อน", drink: "ชาร้อน", next: 5 }
            ]
        },
        5: {
            text: "นี่ครับเครื่องดื่มที่คุณสั่ง... รู้ไหมครับว่าเครื่องดื่มที่เลือกบอกนิสัยคนดื่มได้ด้วยนะ อยากรู้ไหมครับ?",
            name: "พนักงาน",
            choices: [
                { text: "อยากรู้สิ", next: 5.1 },
                { text: "ไม่อยากรู้หรอก", next: 6 }
            ]
        },
        5.1: {
            text: "", 
            name: "พนักงาน",
            choices: [{ text: "จริงด้วยนะ!", next: 6 }]
        },
        6: {
            text: "จริงๆ แล้ว... วันนี้เป็นวันเกิดของผมเองครับ มื้อนี้ผมเลี้ยงเอง คุณไม่จำเป็นต้องจ่ายเงินเลยนะ",
            name: "พนักงาน",
            choices: [
                { text: "อวยพรวันเกิดให้", next: 7 },
                { text: "ขอบคุณตามปกติ", next: 8 }
            ]
        },
        7: {
            text: "ว้าว! คุณจำได้... เอ๊ะ หรือว่าผมเพิ่งบอกไปนะ? ผมดีใจมากเลยครับ! ช่วยเขียนอะไรในสมุดโน้ตเล่มนี้ให้หน่อยได้ไหม?",
            name: "พนักงาน",
            showForm: true
        },
        8: {
            text: "ขอบคุณมากครับที่มาใช้บริการ ผมจะเก็บสมุดโน้ตเล่มนี้ไว้อย่างดีเลย... ขอให้คุณมีวันที่ดีนะครับ",
            name: "พนักงาน",
            choices: [
                { text: "ดูหน้ารวมคำอวยพร", next: 9 },
                { text: "กลับไปเริ่มใหม่", next: 1 }
            ]
        }
    };

    function updateGame(stateKey) {
        const step = story[stateKey];
        if (!step) return;

        // Reset UI Components
        choiceContainer.innerHTML = '';
        wishForm.style.display = 'none';
        dialogueBox.classList.remove('hidden');

        // Character Visibility Management
        if (step.showChar) isCharacterVisible = true;
        if (stateKey === 1) isCharacterVisible = false; 
        characterImg.style.opacity = isCharacterVisible ? "1" : "0";
        characterImg.style.transform = isCharacterVisible ? "translateY(0)" : "translateY(20px)";

        // Update Text & Name
        nameTag.innerText = step.name;
        
        // Dynamic analysis for drink selection
        if (stateKey == 5.1) {
            step.text = `สำหรับ '${selectedDrink}' แสดงว่าคุณเป็นคนใส่ใจในรายละเอียดและชอบความสุนทรีย์ในชีวิตนะครับ`;
        }
        
        textContent.innerText = step.text;

        // Background transition
        if (step.bg) gameContainer.style.backgroundImage = `url('${step.bg}')`;

        // Handle Form Display
        if (step.showForm) {
            wishForm.style.display = 'block';
            dialogueBox.classList.add('hidden');
        } 
        // Handle Choice Display
        else if (step.choices) {
            step.choices.forEach(choice => {
                const btn = document.createElement('div');
                btn.className = 'choice-btn';
                btn.innerText = choice.text;
                btn.onclick = () => {
                    if (choice.drink) selectedDrink = choice.drink;
                    updateGame(choice.next);
                };
                choiceContainer.appendChild(btn);
            });
        }
        
        // End Scene Logic
        if (stateKey == 9) {
            alert("กำลังพาคุณไปยังหน้ารวมคำอวยพร... (ส่วนนี้สามารถเชื่อมต่อ Database ต่อได้ครับ)");
            updateGame(1);
        }
    }

    function submitWish() {
        const name = document.getElementById('user-name').value;
        const wish = document.getElementById('user-wish').value;
        if(name && wish) {
            // ตรงนี้สามารถเพิ่ม Code ส่งข้อมูลไป Google Sheets/Firebase ได้
            alert("บันทึกคำอวยพรของ " + name + " เรียบร้อยแล้ว!");
            updateGame(8);
        } else {
            alert("กรุณาใส่ชื่อและคำอวยพรในสมุดก่อนนะครับ");
        }
    }

    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        updateGame(1);
    }

    // Initialize Game: show start screen first
    // updateGame(1) is called after pressing Start
</script>

</body>
</html>
