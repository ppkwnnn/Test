<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --box-bg: rgba(245, 230, 200, 0.9); /* สีครีมกระดาษเก่า */
            --name-bg: #8b5e3c; /* สีน้ำตาลป้ายชื่อ */
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Tahoma', sans-serif;
        }

        /* ฉากหลัง */
        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('https://via.placeholder.com/1920x1080/442222/ffffff?text=Theater+Background') no-repeat center center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        /* ตัวละคร (Sprite) */
        .character-sprite {
            position: absolute;
            bottom: 100px;
            height: 80%;
            z-index: 1;
            /* ในงานจริงใช้รูป PNG โปร่งใส */
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        /* ส่วนของ UI ข้อความ */
        .dialogue-wrapper {
            position: relative;
            width: 90%;
            max-width: 1000px;
            margin-bottom: 40px;
            z-index: 10;
        }

        /* ป้ายชื่อ */
        .name-tag {
            background-color: var(--name-bg);
            color: white;
            padding: 5px 40px;
            border-radius: 20px 5px 20px 5px;
            display: inline-block;
            font-weight: bold;
            font-size: 1.2rem;
            border: 2px solid #5d3a1a;
            position: absolute;
            top: -20px;
            left: 20px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        /* กล่องข้อความ */
        .dialogue-box {
            background: var(--box-bg);
            border: 4px solid #d2b48c;
            border-radius: 10px;
            padding: 40px 30px 25px;
            min-height: 100px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            position: relative;
        }

        .text-content {
            font-size: 1.5rem;
            color: #332211;
            line-height: 1.4;
        }

        /* ปุ่มข้าม (Skip/Auto) มุมบน */
        .top-menu {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .btn {
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid #fff;
            cursor: pointer;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="top-menu">
            <div class="btn">AUTO</div>
            <div class="btn">SKIP ≫</div>
        </div>

        <img src="https://via.placeholder.com/600x800/228844/ffffff?text=Character" class="character-sprite" alt="Character">

        <div class="dialogue-wrapper">
            <div class="name-tag">คิอิโระ (キイロ)</div>
            <div class="dialogue-box">
                <div class="text-content">
                    กื๊ออออออออ—!! (ぐおおおぉー！！)
                </div>
            </div>
        </div>
    </div>

</body>
</html>
