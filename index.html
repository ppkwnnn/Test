<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Latte Art Post-it</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --cafe-brown: #7D5A50;
            --cafe-beige: #F5E6CA;
            --cafe-cream: #FFF9F0;
            --card-bg: rgba(255, 249, 240, 0.9);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Mali', cursive;
            background-color: var(--cafe-cream);
            overflow: hidden;
        }

        .screen {
            display: none; width: 100%; height: 100vh;
            background-size: cover; background-position: center;
            justify-content: center; align-items: center;
            position: relative;
        }

        .screen.active { display: flex; }

        /* Background สำหรับหน้าเขียนคำอวยพร */
        #game-screen {
            background-image: url('https://drive.google.com/uc?export=view&id=1qAg9r4VieXBG3c0vgIcSa4vwxiW9Wnw_');
        }

        /* UI Card ตามรูปภาพที่แนบมา */
        .ui-card {
            background: var(--card-bg);
            width: 90%;
            max-width: 450px;
            padding: 30px;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            z-index: 10;
        }

        .card-title {
            color: var(--cafe-brown);
            font-size: 1.5rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* Latte Art Selector */
        .art-options {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .art-item {
            cursor: pointer;
            transition: transform 0.2s;
        }

        .art-item img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid transparent;
            background: #E8D5C4;
        }

        .art-item input { display: none; }
        .art-item input:checked + img {
            border-color: var(--cafe-brown);
            transform: scale(1.1);
            background: #D4B499;
        }

        /* Preview Circle (วงกลมใหญ่ตรงกลาง) */
        .preview-container {
            width: 250px;
            height: 250px;
            background-color: #D4B499;
            border-radius: 50%;
            margin: 0 auto 25px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 8px solid #E8D5C4;
            background-size: cover;
            background-position: center;
            transition: background-image 0.5s ease-in-out;
        }

        .preview-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.2); /* ฟุ้งๆ แบบฟองนม */
            border-radius: 50%;
            pointer-events: none;
        }

        .input-overlay {
            z-index: 2;
            width: 80%;
        }

        .input-overlay input, .input-overlay textarea {
            width: 100%;
            background: transparent;
            border: none;
            text-align: center;
            font-family: 'Mali', cursive;
            color: #5D4037;
            outline: none;
            resize: none;
        }

        #user-name { font-weight: bold; font-size: 1.2rem; margin-bottom: 5px; }
        #wish-text { font-size: 1rem; height: 60px; }

        /* ปุ่มแปะลงกระดาน */
        .submit-btn {
            background-color: var(--cafe-brown);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 30px;
            font-size: 1.2rem;
            cursor: pointer;
            font-family: 'Mali', cursive;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background-color: #5D4037;
            transform: translateY(-2px);
        }

        /* Character */
        .character-img {
            position: absolute;
            bottom: 0;
            right: -50px;
            height: 80vh;
            z-index: 1;
            filter: drop-shadow(5px 5px 15px rgba(0,0,0,0.1));
        }

        /* ส่วนของหน้า Gift */
        .gift-card { display: none; }
    </style>
</head>
<body>

    <div id="game-screen" class="screen active">
        
        <img src="https://webstatic.hoyoverse.com/upload/op-public/2021/03/31/ff800e08532c0bf6fd014e72e5ca81a4_8076081534056378253.png" class="character-img">

        <div class="ui-card" id="main-ui">
            <div class="card-title">เลือกลายที่ชอบได้เลย</div>
            
            <div class="art-options">
                <label class="art-item">
                    <input type="radio" name="art" value="Heart" checked onchange="updatePreview(this.value)">
                    <img src="https://drive.google.com/uc?export=view&id=1kRJfQikzrztM-5SPeUxFvKoKkQOOt-hI">
                </label>
                <label class="art-item">
                    <input type="radio" name="art" value="Rosetta" onchange="updatePreview(this.value)">
                    <img src="https://drive.google.com/uc?export=view&id=1zjZJcvIegaWh93h_0J7So9E8vSI_cuwL">
                </label>
                <label class="art-item">
                    <input type="radio" name="art" value="Cat Paw" onchange="updatePreview(this.value)">
                    <img src="https://drive.google.com/uc?export=view&id=1mnkyTZunwc6hTxdrYsHcOQZhby5TGgJu">
                </label>
                <label class="art-item">
                    <input type="radio" name="art" value="Star" onchange="updatePreview(this.value)">
                    <img src="https://drive.google.com/uc?export=view&id=1mnkyTZunwc6hTxdrYsHcOQZhby5TGgJu">
                </label>
            </div>

            <div class="preview-container" id="latte-preview" style="background-image: url('https://drive.google.com/uc?export=view&id=1kRJfQikzrztM-5SPeUxFvKoKkQOOt-hI')">
                <div class="input-overlay">
                    <input type="text" id="user-name" placeholder="ชื่อ" maxlength="15">
                    <textarea id="wish-text" placeholder="เขียนคำอวยพร" maxlength="100"></textarea>
                </div>
            </div>

            <button class="submit-btn" onclick="submitWish()">แปะลงกระดาน</button>
        </div>

        <div class="ui-card gift-card" id="gift-ui">
            <div class="card-title">Special gift for you</div>
            <p style="color: var(--cafe-brown); margin-bottom: 20px;">ขอบคุณสำหรับคำอวยพรนะครับ<br>รับนี่ไปสิครับ...</p>
            <a href="https://drive.google.com/uc?export=download&id=1i-3rUS9Fc_UNuM1jPZJiWFdpT43HxEd-" target="_blank">
                <button class="submit-btn" style="background-color: #A3C9A8; margin-bottom: 15px;">ดาวน์โหลด Wallpaper</button>
            </a>
            <br>
            <button onclick="location.reload()" style="background: none; border: none; color: #999; cursor: pointer;">กลับหน้าหลัก</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://project-test01-49383-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ฟังก์ชันเปลี่ยนรูปในวงกลม Preview
        function updatePreview(val) {
            const preview = document.getElementById('latte-preview');
            let url = "";
            if(val === "Heart") url = "https://drive.google.com/uc?export=view&id=1kRJfQikzrztM-5SPeUxFvKoKkQOOt-hI";
            if(val === "Rosetta") url = "https://drive.google.com/uc?export=view&id=1zjZJcvIegaWh93h_0J7So9E8vSI_cuwL";
            if(val === "Cat Paw") url = "https://drive.google.com/uc?export=view&id=1mnkyTZunwc6hTxdrYsHcOQZhby5TGgJu";
            if(val === "Star") url = "https://drive.google.com/uc?export=view&id=1mnkyTZunwc6hTxdrYsHcOQZhby5TGgJu";
            
            preview.style.backgroundImage = `url('${url}')`;
        }

        function submitWish() {
            const name = document.getElementById('user-name').value;
            const text = document.getElementById('wish-text').value;
            const art = document.querySelector('input[name="art"]:checked').value;

            if(!name || !text) {
                alert("กรุณากรอกชื่อและข้อความก่อนนะครับ");
                return;
            }

            database.ref('wishes').push({
                name: name,
                text: text,
                art: art,
                timestamp: Date.now()
            }).then(() => {
                document.getElementById('main-ui').style.display = 'none';
                document.getElementById('gift-ui').style.display = 'block';
            });
        }
    </script>
</body>
</html>
