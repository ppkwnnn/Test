<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ละอองไออุ่น ถึงคุณคนโปรด</title>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Mali:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #FDFBF7; --beige: #F5E6D3; --brown: #A67B5B;
            --dark: #5D4037; --nude: #D7B19D;
        }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Mali', cursive; overflow: hidden; background: #eee; }

        /* ฉากทั้งหมด */
        .scene {
            display: none; width: 100%; height: 100vh; position: absolute;
            background-size: cover; background-position: center; transition: 0.5s;
        }
        .active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* หน้าแรก */
        #start-screen { background-color: var(--beige); }
        .logo { width: 250px; margin-bottom: 20px; border-radius: 20px; }
        .btn {
            background: var(--cream); color: var(--dark); border: 2px solid var(--brown);
            padding: 12px 40px; margin: 10px; border-radius: 50px; cursor: pointer;
            font-size: 1.1rem; font-family: 'Itim'; transition: 0.3s;
            box-shadow: 0 4px 0 var(--brown);
        }
        .btn:hover { transform: translateY(-3px); background: var(--brown); color: white; }

        /* ตัวละครและกล่องพูด */
        .char-img { height: 75vh; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); z-index: 1; pointer-events: none; }
        .dialog-box {
            position: absolute; bottom: 20px; width: 90%; max-width: 800px;
            background: rgba(255, 255, 255, 0.95); border: 4px solid var(--brown);
            border-radius: 20px; padding: 20px; z-index: 2; cursor: pointer;
        }
        .name-tag { font-weight: bold; color: var(--brown); font-size: 1.3rem; margin-bottom: 5px; }
        .choices { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .choice-btn { background: var(--nude); border: none; padding: 10px; border-radius: 10px; cursor: pointer; color: white; }

        /* บอร์ดคำอวยพร */
        .board-container { position: relative; width: 100%; height: 100%; overflow: hidden; background: #d2b48c; }
        .postit {
            width: 130px; height: 130px; background: white; border-radius: 50%;
            position: absolute; display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 10px; font-size: 0.8rem; box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
            cursor: pointer; border: 4px solid var(--beige);
        }

        /* หน้าเขียน */
        .write-form { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; text-align: center; }
        .pattern-list img { width: 60px; height: 60px; margin: 5px; cursor: pointer; border-radius: 50%; border: 3px solid transparent; }
        .pattern-list img.selected { border-color: var(--brown); }
    </style>
</head>
<body>

    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <audio id="sfx-bell" src="https://assets.mixkit.co/active_storage/sfx/1066/1066-preview.mp3"></audio>
    <audio id="sfx-cup" src="https://assets.mixkit.co/active_storage/sfx/2048/2048-preview.mp3"></audio>

    <section id="scene-start" class="scene active">
        <img src="https://img5.pic.in.th/file/secure-sv1/ff800e08532c0bf6fd014e72e5ca81a4_8076081534056378253.png" class="logo" alt="Logo">
        <h1>ละอองไออุ่น ถึงคุณคนโปรด</h1>
        <button class="btn" onclick="startApp()">เริ่มเกม</button>
        <button class="btn" onclick="viewBoard()">ดูคำอวยพร</button>
    </section>

    <section id="scene-game" class="scene" style="background-color: #f9f1e7;">
        <img id="kyomu-img" src="https://img5.pic.in.th/file/secure-sv1/ff800e08532c0bf6fd014e72e5ca81a4_8076081534056378253.png" class="char-img" style="display:none;">
        <div class="dialog-box" id="dialog-box" onclick="nextLine()">
            <div class="name-tag" id="speaker-name">บรรยาย</div>
            <div id="dialog-text">กำลังโหลด...</div>
            <div id="choice-area" class="choices"></div>
        </div>
    </section>

    <section id="scene-write" class="scene" style="background-color: var(--beige);">
        <div class="write-form">
            <h3>The Latte Art Post-it</h3>
            <div class="pattern-list">
                <img src="https://cdn-icons-png.flaticon.com/512/833/833472.png" onclick="pickPatt(this, 'Heart')" title="Heart">
                <img src="https://cdn-icons-png.flaticon.com/512/2926/2926214.png" onclick="pickPatt(this, 'Rosetta')" title="Rosetta">
                <img src="https://cdn-icons-png.flaticon.com/512/616/616430.png" onclick="pickPatt(this, 'Cat Paw')" title="Cat Paw">
            </div>
            <input type="text" id="iname" placeholder="ชื่อของคุณ" style="width:100%; padding:10px; margin:10px 0;">
            <textarea id="iwish" placeholder="เขียนคำอวยพร..." style="width:100%; height:80px; padding:10px;"></textarea>
            <button class="btn" onclick="saveWish()">ส่งข้อความ & รับของขวัญ</button>
        </div>
    </section>

    <section id="scene-board" class="scene">
        <div class="board-container" id="board-content"></div>
        <button class="btn" style="position:fixed; bottom:10px; left:10px;" onclick="location.reload()">กลับหน้าหลัก</button>
    </section>

<script>
    const FIREBASE_URL = "https://project-test01-49383-default-rtdb.firebaseio.com/wishes.json";
    let cur = 0;
    let selectedPatt = "";
    let data = { drink: "", snack: "" };

    const script = [
        { s: "บรรยาย", t: "หลังจากผ่านมรสุมความเหนื่อยล้ามาทั้งสัปดาห์... คุณจึงตัดสินใจก้าวเท้าออกจากบ้านเพื่อสูดอากาศบริสุทธิ์" },
        { s: "บรรยาย", t: "คุณเดินผ่านร้านกาแฟเล็ก ๆ ร้านหนึ่ง มันดูเรียบง่ายแต่น่าดึงดูดใจอย่างบอกไม่ถูก..." },
        { s: "Y", t: "อืมจะลองเข้าไปดีมั้ยนะ ?", choices: [
            { t: "เข้าไปในร้าน", next: 3 },
            { t: "ไม่เข้าไป", next: -1 }
        ]},
        { s: "บรรยาย", t: "กริ๊ง... กลิ่นกาแฟคั่วบดโอบล้อมตัวคุณไว้ราวกับกำลังปลอบประโลม บรรยากาศดีจัง นั่งตรงไหนดีนะ?" },
        { s: "เคียวมุ", t: "สวัสดีครับ... มาครั้งแรกหรือเปล่าครับ? รับเครื่องดื่มอะไรดีครับ?", char: true, choices: [
            { t: "ลาเต้", next: 5, act:()=>data.drink="ลาเต้" },
            { t: "ช็อกโกแลต", next: 5, act:()=>data.drink="ช็อกโกแลต" }
        ]},
        { s: "เคียวมุ", t: "แล้วรับขนมทานคู่กันเพิ่มด้วยไหมครับ?", char: true, choices: [
            { t: "สตรอว์เบอร์รี่ช็อตเค้ก", next: 6 },
            { t: "ครัวซองต์", next: 6 }
        ]},
        { s: "เคียวมุ", t: "รู้ไหมครับ วันนี้เป็นวันเกิดของผมเอง ผมอยากเลี้ยงมื้อนี้คุณจัง...", char: true, choices: [
            { t: "สุขสันต์วันเกิดนะ! (เขียนคำอวยพร)", next: 100 },
            { t: "ใจดีจัง ขอบคุณนะ", next: 7 }
        ]},
        { s: "เคียว_มุ", t: "ขอบคุณที่แวะมานะครับ หวังว่าเราจะได้พบกันใหม่นะ", char: true, next: -1 }
    ];

    function startApp() {
        document.getElementById('bgm').play();
        go('scene-game');
        render();
    }

    function render() {
        if (cur === -1) { location.reload(); return; }
        if (cur === 100) { go('scene-write'); return; }

        const step = script[cur];
        document.getElementById('speaker-name').innerText = step.s;
        document.getElementById('dialog-text').innerText = step.t;
        document.getElementById('kyomu-img').style.display = step.char ? 'block' : 'none';
        
        const area = document.getElementById('choice-area');
        area.innerHTML = '';
        if (step.choices) {
            step.choices.forEach(c => {
                const b = document.createElement('button');
                b.className = 'choice-btn';
                b.innerText = c.t;
                b.onclick = (e) => { 
                    e.stopPropagation(); 
                    if(c.act) c.act();
                    cur = c.next; 
                    render(); 
                };
                area.appendChild(b);
            });
        }
    }

    function nextLine() {
        if (!script[cur].choices) {
            cur++;
            render();
        }
    }

    function go(id) {
        document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function pickPatt(img, name) {
        document.querySelectorAll('.pattern-list img').forEach(i => i.classList.remove('selected'));
        img.classList.add('selected');
        selectedPatt = name;
    }

    async function saveWish() {
        const n = document.getElementById('iname').value;
        const w = document.getElementById('iwish').value;
        if (!n || !w || !selectedPatt) return alert("กรุณากรอกข้อมูลให้ครบจ้า");

        const payload = { name: n, wish: w, pattern: selectedPatt, ts: Date.now() };
        await fetch(FIREBASE_URL, { method: 'POST', body: JSON.stringify(payload) });
        
        document.getElementById('sfx-bell').play();
        alert("ส่งคำอวยพรสำเร็จ! รับ Wallpaper เป็นของขวัญจากเคียวมุนะ");
        window.open('https://drive.google.com/file/d/1i-3rUS9Fc_UNuM1jPZJiWFdpT43HxEd-/view?usp=sharing');
        location.reload();
    }

    async function viewBoard() {
        go('scene-board');
        const res = await fetch(FIREBASE_URL);
        const data = await res.json();
        const cont = document.getElementById('board-content');
        cont.innerHTML = '';
        for (let id in data) {
            const div = document.createElement('div');
            div.className = 'postit';
            div.style.left = (Math.random() * 70 + 5) + '%';
            div.style.top = (Math.random() * 70 + 5) + '%';
            div.style.transform = `rotate(${Math.random()*20-10}deg)`;
            div.innerHTML = `<b>${data[id].name}</b><br>${data[id].pattern}`;
            div.onclick = () => {
                document.getElementById('sfx-cup').play();
                alert(`"${data[id].wish}"\n- จาก ${data[id].name}`);
            };
            cont.appendChild(div);
        }
    }
</script>
</body>
</html>
