<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warm Café Visual Novel - Birthday Special</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cafe-cream: #FDF5E6;
            --cafe-brown: #5a4a42;
            --cafe-gold: #f0c987;
            --pink-notebook: #ff85a2;
            --pink-line: #ffb3c1;
            --glass-white: rgba(255, 255, 255, 0.85);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Prompt', sans-serif;
            overflow: hidden;
            background-color: #222;
        }

        /* Background Layer */
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            transition: background-image 1.2s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        /* Character Layer */
        #character {
            position: absolute;
            bottom: 180px; /* ขยับขึ้นเหนือกล่องคำพูดเล็กน้อย */
            height: 75%;
            max-height: 700px;
            opacity: 0;
            transition: opacity 0.8s ease, transform 0.5s ease;
            z-index: 1;
        }

        /* --- Dialogue Box Style (ตามรูปตัวอย่าง) --- */
        #dialogue-box {
            width: 92%;
            max-width: 900px;
            min-height: 160px;
            background: #f5e9df;
            border-radius: 25px;
            margin-bottom: 30px;
            padding: 40px 45px 25px 45px;
            box-sizing: border-box;
            border: 3px solid #7a5133;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            z-index: 10;
            position: relative;
            backdrop-filter: blur(8px);
        }

        #name-tag {
            position: absolute;
            top: -18px;
            left: 45px;
            background: #5a3a1f;
            color: #fff;
            padding: 6px 45px;
            border-radius: 18px;
            font-weight: 600;
            font-size: 1.2rem;
            border: 1px solid #ffffff;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.1);
            text-shadow: none;
        }

        #text-content {
            font-size: 1.2rem;
            color: var(--cafe-brown);
            line-height: 1.8;
        }

        .auto-indicator {
            position: absolute;
            right: 30px;
            bottom: 15px;
            color: var(--cafe-gold);
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* --- Choice Style --- */
        #choice-container {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 80%;
            max-width: 400px;
            z-index: 20;
        }

        .choice-btn {
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid var(--cafe-gold);
            padding: 14px 25px;
            border-radius: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--cafe-brown);
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .choice-btn:hover {
            background: var(--cafe-gold);
            color: white;
            transform: scale(1.05);
        }

        /* สมุดโน้ตสไตล์น้ำตาล-ขาว */
        #wish-form {
            display: none;
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 450px;
            height: 580px;
            background: #ffffff; /* กระดาษสีขาวสะอาด */
            padding: 40px 30px 30px 65px; /* เว้นที่ด้านซ้ายให้ห่วง */
            border-radius: 5px 20px 20px 5px;
            box-shadow: 15px 15px 40px rgba(0,0,0,0.2);
            z-index: 30;
            box-sizing: border-box;
            border: 1px solid #e0e0e0;
            border-left: 10px solid #8B4513; /* สันสมุดสีน้ำตาลเข้ม */
        }

        /* สร้างห่วงสมุด (Spiral) โทนสีน้ำตาล */
        #wish-form::before {
            content: "";
            position: absolute;
            top: 30px;
            left: 15px;
            bottom: 30px;
            width: 35px;
            /* สร้างลายห่วงสีน้ำตาลสลับเข้มอ่อน */
            background-image: linear-gradient(to bottom, 
                transparent 6px, 
                #5a4a42 6px, #5a4a42 18px, 
                transparent 18px, transparent 30px);
            background-size: 100% 30px;
            z-index: 31;
        }

        /* หัวกระดาษ */
        .notebook-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #D2B48C; /* เส้นคั่นสีน้ำตาลอ่อน */
            padding-bottom: 10px;
        }

        .notebook-header .date-text {
            color: #8B4513;
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* พื้นหลังเส้นบรรทัดสีน้ำตาลจางๆ */
        .notebook-body {
            background-image: linear-gradient(#f0e6d6 1px, transparent 1px);
            background-size: 100% 32px;
            line-height: 32px;
            height: 380px;
        }

        #user-name, #user-wish {
            width: 100%;
            background: transparent;
            border: none;
            font-family: 'Prompt', sans-serif;
            outline: none;
            color: #444;
        }

        #user-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 10px;
            border-bottom: 1px dashed #D2B48C;
        }

        #user-wish {
            line-height: 32px;
            resize: none;
        }

        /* ปุ่มส่งสไตล์คาเฟ่ (น้ำตาลเข้ม) */
        .submit-btn {
            margin-top: 20px;
            background: #5a4a42; /* สีเดียวกับป้ายชื่อพนักงาน */
            color: #ffffff;
            border: none;
            padding: 12px 35px;
            border-radius: 25px;
            cursor: pointer;
            float: right;
            font-family: 'Prompt', sans-serif;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .submit-btn:hover {
            background: #8B4513;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        /* Wish board overlay ปรับใหม่ */
        #wish-board {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #wish-board .board-card {
            width: 95%;
            max-width: 1000px; /* ขยายให้เห็นหน้าคู่ชัดขึ้น */
            height: 85vh;
            /* ใส่ Link รูปสมุดที่คุณส่งมา */
            background-image: url('https://i.ibb.co/99ZQbx6V/IMG-7806.jpg'); 
            background-size: 100% 100%;
            background-repeat: no-repeat;
            position: relative;
            
            /* ปรับ Padding ให้เนื้อหาไม่ไปทับขอบสมุดหรือรอยพับตรงกลาง */
            padding: 60px 50px; 
            box-sizing: border-box;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            
            /* เพิ่มลูกเล่นให้ดูเหมือนวางอยู่บนโต๊ะ */
            border-radius: 15px;
            overflow: hidden;
        }

        /* รายการ Post-it */
        #wish-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px; /* ลดช่องว่างระหว่างแผ่นเล็กน้อย */
            justify-content: center;
            overflow-y: auto;
            height: 100%;
            padding: 20px;
            scrollbar-width: thin;
            scrollbar-color: #AD8350 transparent;
        }

        /* สไตล์แผ่น Post-it ขนาดจิ๋ว */
        .post-it {
            width: 90px;  /* เล็กลงเพื่อให้แปะได้เยอะขึ้น */
            height: 90px; /* เล็กลงเพื่อให้แปะได้เยอะขึ้น */
            padding: 8px;
            box-shadow: 2px 3px 6px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom-right-radius: 2px;
            font-family: 'Prompt', sans-serif;
        }

        .post-it:hover {
            transform: scale(1.1) rotate(0deg) !important;
            box-shadow: 5px 10px 20px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .post-it .wish-name {
            font-weight: 600;
            font-size: 0.75rem; /* ลดขนาดฟอนต์ชื่อ */
            color: #433422;
            word-break: break-word;
            line-height: 1.1;
        }

        /* ซ่อนข้อความยาวๆ ไว้ดูตอน Hover หรือ Click */
        .post-it .wish-text-preview {
            display: none; /* หากต้องการโชว์แค่ชื่อ */
        }

        /* ซ่อนคำว่า READ MORE ในขนาดจิ๋วเพื่อความสะอาดตา หรือปรับให้เล็กลงมาก */
        .post-it .read-more-text {
            font-size: 0.45rem;
            margin-top: 5px;
            opacity: 0.6;
            letter-spacing: 0.5px;
        }

        /* สไตล์ของหน้าต่าง Modal */
        #wish-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6); /* พื้นหลังดำจางๆ */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000; /* ให้อยู่เหนือทุกอย่าง */
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: #FDF5E6; /* สีขาวครีม */
            width: 85%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 2px solid #D6BD98;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.2rem;
            color: #AD8350;
            cursor: pointer;
        }

        #modal-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #5a4a42;
            margin-bottom: 15px;
            border-bottom: 1px solid #D6BD98;
            padding-bottom: 10px;
        }

        #modal-text {
            font-size: 1.1rem;
            color: #433422;
            line-height: 1.6;
            white-space: pre-wrap; /* เพื่อให้ขึ้นบรรทัดใหม่ตามที่ผู้ใช้พิมพ์ */
        }

        /* คลาสสำหรับซ่อน Modal */
        .hidden { display: none !important; }

        .close-board-btn {
            position: absolute;
            top: 15px;
            right: 25px;
            background: #8B4513;
            color: white;
            border: none;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            cursor: pointer;
            z-index: 1001;
        }

        #start-screen {
            position: fixed;
            inset: 0;
            /* เปลี่ยน URL เป็นรูปคาเฟ่ของคุณ */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1509042239263-0219ca99738d?q=80&w=1974&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* จัดให้อยู่กลางจอ */
            font-family: 'Prompt', sans-serif;
        }

        .start-logo {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 800;
            color: white;
            margin-bottom: 40px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
            letter-spacing: 5px;
        }

        /* Container สำหรับปุ่มเรียงแนวนอน */
        .menu-container {
            display: flex;
            gap: 20px; /* ระยะห่างระหว่างปุ่ม */
            justify-content: center;
        }

        .menu-btn {
            background: rgba(90, 58, 24, 0.6); /* สีน้ำตาลโปร่งแสง 60% */
            color: white;
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            border-radius: 8px; /* โค้งมนเล็กน้อยตามรูปตัวอย่าง */
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            background: rgba(90, 58, 24, 0.9); /* เข้มขึ้นเมื่อเอาเมาส์วาง */
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .hidden { display: none !important; }

        #open-wish-board {
            position: fixed;
            bottom: 18px;
            right: 18px;
            padding: 12px 16px;
            border-radius: 999px;
            border: none;
            font-size: 0.95rem;
            background: rgba(90, 74, 66, 0.92);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.25);
            z-index: 1100;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        #open-wish-board:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 22px rgba(0,0,0,0.3);
        }

        @media (max-width: 600px) {
            #character { height: 60%; bottom: 180px; }
            #dialogue-box { font-size: 1rem; padding: 35px 25px 20px 25px; }
            #name-tag { left: 25px; padding: 4px 30px; font-size: 1rem; }
            #wish-form { height: 500px; padding-left: 55px; }
        }
    </style>
</head>
<body>

<div id="start-screen">
    <div class="start-logo">🍵 Warm Café</div>
    
    <div class="menu-container">
        <button class="menu-btn" onclick="startGame()">STORY</button>
        <button class="menu-btn" onclick="toggleWishBoard(true)">WISHES</button>
        <button class="menu-btn" onclick="showCredits()">CREDITS</button>
    </div>
</div>

<div id="game-container" style="background-image: url('https://images.unsplash.com/photo-1509042239263-0219ca99738d?q=80&w=1974&auto=format&fit=crop');">
    
    <img id="character" src="https://webstatic.hoyoverse.com/upload/op-public/2021/03/31/6ce27f03e5f178c0048d38d74c0b853d_7730768930418605664.png" alt="Staff">

    <div id="choice-container"></div>

    <div id="dialogue-box">
        <div id="name-tag">???</div>
        <div id="text-content">...</div>
        <div class="auto-indicator">AUTO ▶</div>
    </div>

    <div id="wish-form">
        <div class="notebook-header">
            <span class="date-text">BIRTHDAY NOTE 🖋️</span>
            <div style="color: #D2B48C;">☕</div>
        </div>
        
        <input type="text" id="user-name" placeholder="ชื่อของคุณ..." autocomplete="off">
        
        <div class="notebook-body">
            <textarea id="user-wish" rows="11" placeholder="เขียนความในใจและคำอวยพรที่นี่..."></textarea>
        </div>
        
        <button class="submit-btn" onclick="submitWish()">บันทึกลงสมุด 📋</button>
    </div>

    <div id="wish-board" class="hidden">
        <div class="board-card">
            <button class="close-board-btn" onclick="toggleWishBoard(false)">✕</button>
            <div class="board-title-container">📔 สมุดรวมคำอวยพร</div>
            <div id="wish-list">
                </div>
        </div>
    </div>

    <button id="open-wish-board" type="button" aria-label="ดูหน้ารวมคำอวยพร" onclick="toggleWishBoard(true)">
        📒 ดูคำอวยพร
    </button>
</div>

<div id="wish-modal" class="hidden" onclick="closeWishModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeWishModal()">✕</button>
        <div id="modal-name">ชื่อผู้เขียน</div>
        <div id="modal-text">ข้อความคำอวยพร...</div>
    </div>
</div>

<script>
    const textContent = document.getElementById('text-content');
    const nameTag = document.getElementById('name-tag');
    const choiceContainer = document.getElementById('choice-container');
    const characterImg = document.getElementById('character');
    const dialogueBox = document.getElementById('dialogue-box');
    const wishForm = document.getElementById('wish-form');
    const gameContainer = document.getElementById('game-container');

    let selectedDrink = "";
    let isCharacterVisible = false;

    const story = {
        1: {

            ]
        },
        3: {
            text: "สวัสดียามบ่ายครับ ขอบคุณที่แวะมาที่ร้านของเรานะครับ อากาศวันนี้เป็นอย่างไรบ้าง?",
            name: "พนักงาน",

            choices: [
                { text: "อากาศค่อนข้างอบอุ่น", next: 4.1 },

        4.1: {
            text: "ถ้าอากาศอุ่นๆ แบบนี้ รับเครื่องดื่มเย็นๆ สักแก้วน่าจะช่วยให้สดชื่นขึ้นนะ รับอะไรดีครับ?",

                { text: "มัทฉะลาเต้เย็น", drink: "มัทฉะลาเต้เย็น", next: 5 },
                { text: "อิตาเลี่ยนโซดา", drink: "อิตาเลี่ยนโซดา", next: 5 },
                { text: "ชาผลไม้เย็น", drink: "ชาผลไม้เย็น", next: 5 }
            ]
        },
        4.2: {
            text: "วันที่อากาศเย็นแบบนี้ การดื่มอะไรอุ่นๆ จะช่วยให้ร่างกายผ่อนคลายขึ้นมากเลยล่ะครับ รับอะไรดี?",
            name: "พนักงาน",
            choices: [
                { text: "ลาเต้ร้อน", drink: "ลาเต้ร้อน", next: 5 },
                { text: "อเมริกาโน่ร้อน", drink: "อเมริกาโน่ร้อน", next: 5 },
                { text: "มัทฉะลาเต้ร้อน", drink: "มัทฉะลาเต้ร้อน", next: 5 },
                { text: "ชาร้อน", drink: "ชาร้อน", next: 5 }
            ]
        },
        5: {
            text: "นี่ครับเครื่องดื่มที่คุณสั่ง... รู้ไหมครับว่าเครื่องดื่มที่เลือกบอกนิสัยคนดื่มได้ด้วยนะ อยากรู้ไหมครับ?",
            name: "พนักงาน",
            choices: [
                { text: "อยากรู้สิ", next: 5.1 },
                { text: "ไม่อยากรู้หรอก", next: 6 }
            ]
        },
        5.1: {
            text: "", 
            name: "พนักงาน",
            choices: [{ text: "จริงด้วยนะ!", next: 6 }]
        },
        6: {
            text: "จริงๆ แล้ว... วันนี้เป็นวันเกิดของผมเองครับ มื้อนี้ผมเลี้ยงเอง คุณไม่จำเป็นต้องจ่ายเงินเลยนะ",
            name: "พนักงาน",
            choices: [
                { text: "อวยพรวันเกิดให้", next: 7 },
                { text: "ขอบคุณตามปกติ", next: 8 }
            ]
        },
        7: {
            text: "ว้าว! คุณจำได้... เอ๊ะ หรือว่าผมเพิ่งบอกไปนะ? ผมดีใจมากเลยครับ! ช่วยเขียนอะไรในสมุดโน้ตเล่มนี้ให้หน่อยได้ไหม?",
            name: "พนักงาน",
            showForm: true
        },
        8: {
            text: "ขอบคุณมากครับที่มาใช้บริการ ผมจะเก็บสมุดโน้ตเล่มนี้ไว้อย่างดีเลย... ขอให้คุณมีวันที่ดีนะครับ",
            name: "พนักงาน",
            choices: [
                { text: "ดูหน้ารวมคำอวยพร", next: 9 },
                { text: "กลับไปเริ่มใหม่", next: 1 }
            ]
        },
        9: { // เพิ่มส่วนนี้เข้าไป
            text: "กำลังเปิดสมุดคำอวยพร...",
            name: "ระบบ",
            choices: []
        }
    };

    function updateGame(stateKey) {
        const step = story[stateKey];
        if (!step) return;

        // Reset UI Components
        choiceContainer.innerHTML = '';
        wishForm.style.display = 'none';
        dialogueBox.classList.remove('hidden');

        // Character Visibility Management
        if (step.showChar) isCharacterVisible = true;
        if (stateKey === 1) isCharacterVisible = false; 
        characterImg.style.opacity = isCharacterVisible ? "1" : "0";
        characterImg.style.transform = isCharacterVisible ? "translateY(0)" : "translateY(20px)";

        // Update Text & Name
        nameTag.innerText = step.name;
        
        // Dynamic analysis for drink selection
        if (stateKey == 5.1) {
            step.text = `สำหรับ '${selectedDrink}' แสดงว่าคุณเป็นคนใส่ใจในรายละเอียดและชอบความสุนทรีย์ในชีวิตนะครับ`;
        }
        
        textContent.innerText = step.text;

        // Background transition
        if (step.bg) gameContainer.style.backgroundImage = `url('${step.bg}')`;

        // Handle Form Display
        if (step.showForm) {
            wishForm.style.display = 'block';
            dialogueBox.classList.add('hidden');
        } 
        // Handle Choice Display
        else if (step.choices) {
            step.choices.forEach(choice => {
                const btn = document.createElement('div');
                btn.className = 'choice-btn';
                btn.innerText = choice.text;
                btn.onclick = () => {
                    if (choice.drink) selectedDrink = choice.drink;
                    updateGame(choice.next);
                };
                choiceContainer.appendChild(btn);
            });
        }
        
        // End Scene Logic
        if (stateKey === 9 || stateKey === "9") {
            toggleWishBoard(true);
            return;
        }
    }

    const FIREBASE_DB_URL = 'https://project-test01-49383-default-rtdb.firebaseio.com';
    const LOCAL_STORAGE_KEY = 'warm-cafe-wishes';

    function formatTimestamp(ts) {
        const d = new Date(ts);
        if (Number.isNaN(d.getTime())) return '';
        return d.toLocaleString('th-TH', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function renderWishes(wishes = []) {
        const container = document.getElementById('wish-list');
        if (!container) return;
        
        if (!wishes.length) {
            container.innerHTML = '<p style="color: #5a4a42;">ยังไม่มีคำอวยพรในสมุดเล่มนี้...</p>';
            return;
        }

        // ชุดสี Earth Tone แบบละมุน
        const earthToneColors = [
            '#EAE0D5', // Sand
            '#C6AC8F', // Warm Tan
            '#AD8350', // Muted Gold/Oak
            '#8E9775', // Sage Green
            '#A2AD91', // Light Olive
            '#D6BD98', // Dust
            '#BCA37F'  // Clay
        ];

        const items = wishes.map(w => {
            // สุ่มสีจากชุด Earth Tone
            const randomColor = earthToneColors[Math.floor(Math.random() * earthToneColors.length)];
            // สุ่มองศาการเอียงเล็กน้อยให้ดูเป็นธรรมชาติ
            const randomRotate = (Math.random() * 8 - 4).toFixed(2); 

            return `
                <div class="post-it" 
                     style="background-color: ${randomColor}; transform: rotate(${randomRotate}deg); border-left: 2px solid rgba(0,0,0,0.05);"
                     onclick="showWishDetail('${w.name}', '${w.wish.replace(/'/g, "\\'")}')">
                    <div class="wish-name">${w.name || 'Anonymous'}</div>
                    <div class="read-more-text">READ MORE</div>
                </div>
            `;
        });
        
        container.innerHTML = items.join('');
    }

    // ฟังก์ชันแสดงรายละเอียดคำอวยพร
    function showWishDetail(name, wish) {
        const modal = document.getElementById('wish-modal');
        const modalName = document.getElementById('modal-name');
        const modalText = document.getElementById('modal-text');

        modalName.innerText = `จากคุณ: ${name}`;
        modalText.innerText = wish;

        modal.classList.remove('hidden');
    }

    // ฟังก์ชันปิด Modal
    function closeWishModal() {
        const modal = document.getElementById('wish-modal');
        modal.classList.add('hidden');
    }

    function saveLocalCache(wishes) {
        try {
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(wishes || []));
        } catch (e) {
            // ignore
        }
    }

    function loadLocalCache() {
        try {
            const raw = localStorage.getItem(LOCAL_STORAGE_KEY);
            return raw ? JSON.parse(raw) : [];
        } catch (e) {
            return [];
        }
    }

    async function loadWishes() {
        try {
            const res = await fetch(`${FIREBASE_DB_URL}/wishes.json`);
            if (!res.ok) throw new Error('failed to fetch');
            const data = await res.json();
            const wishes = data ? Object.values(data) : [];
            renderWishes(wishes);
            saveLocalCache(wishes);
        } catch (err) {
            renderWishes(loadLocalCache());
        }
    }

    function toggleWishBoard(show) {
        const board = document.getElementById('wish-board');
        if (!board) return;
        board.classList.toggle('hidden', !show);
        if (show) {
            loadWishes();
        }
    }

    function showCredits() {
        alert("Warm Café Visual Novel\nCreated with ❤️ for a Special Birthday\nArt & Code by: Gemini");
    }

    async function submitWish() {
        const name = document.getElementById('user-name').value.trim();
        const wish = document.getElementById('user-wish').value.trim();
        if (!name || !wish) {
            alert("กรุณาใส่ชื่อและคำอวยพรในสมุดก่อนนะครับ");
            return;
        }

        const entry = {
            name,
            wish,
            timestamp: Date.now(),
        };

        try {
            const res = await fetch(`${FIREBASE_DB_URL}/wishes.json`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(entry),
            });
            if (!res.ok) throw new Error('upload failed');

            alert(`บันทึกคำอวยพรของ ${name} เรียบร้อยแล้ว!`);
            loadWishes();
            document.getElementById('user-name').value = '';
            document.getElementById('user-wish').value = '';
            updateGame(8);
        } catch (err) {
            console.warn(err);
            alert('เกิดข้อผิดพลาดขณะบันทึก ลองอีกครั้งในภายหลัง');
        }
    }

    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        updateGame(1);
        loadWishes();
    }

    // Initialize Game: show start screen first
    // updateGame(1) is called after pressing Start
</script>
